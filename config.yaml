# Rental Tax Pipeline — project configuration
#
# Paths are relative to the project root unless absolute.

templates:
  str: "years/2024/outputs/2024 - STR - Income Expense summary .xlsx"
  ltr: "years/2024/outputs/LTR- Income Expense summary2024.xlsx"

# Where per-year data lives. {year} is substituted at runtime.
year_paths:
  root: years/{year}
  inputs: years/{year}/inputs
  bank_inputs: years/{year}/inputs/bank
  pm_ltr_inputs: years/{year}/inputs/pm_ltr
  pm_str_inputs: years/{year}/inputs/pm_str
  intermediate: years/{year}/intermediate
  outputs: years/{year}/outputs
  review_log: years/{year}/review_log.csv

# Category vocabulary. Used for Sheet dropdown validation and writer routing.
categories:
  primary:
    - STR
    - LTR
    - Personal
    - Skip
    - Split
    - STR - Split
    - LTR - Split
  # Sub-categories within a side (expanded in Phase 2 once real templates are known)
  str_subcategories: []
  ltr_subcategories: []

# Property manager identities — used by the PM parser and double-count guard.
property_managers:
  ltr:
    # name_contains: substrings found on bank descriptions for PM payouts
    name_contains: []
  str:
    name_contains: []

# Bootstrap matching thresholds
bootstrap:
  date_window_days: 3
  description_fuzzy_threshold: 0.72  # 0..1 ratio, ratcheted in Phase 2
  min_confidence_to_auto_learn: 0.80

# Maps Rent QC category strings (left) to LTR template row labels (right).
# null means exclude from the template (e.g., security deposits, owner distributions).
rentqc_to_ltr_template:
  # Income
  "Rent Income": "Sales revenue"
  "Prepaid Rent": "Sales revenue"
  "Late Fee": "late fees revenue"
  "Laundry Income": "Laundry revenue"
  "Security Deposits Clearing": null
  "Security Deposits": null

  # Operating expenses
  "Management Fees": "Management Fees"
  "Lawn and Snow Care": "Lawn and Snow Care"
  "Water": "Utilities"
  "Electricity & Gas": "Utilities"
  "Garbage and Recycling": "Utilities"
  "Sewer": "Utilities"
  "Pest Control": "Pest Control"
  "Plumbing": "Plumbing"
  "Carpet Cleaning": "Cleaning Fees"
  "HVAC (Heat, Ventilation, Air)": "Appliances"
  "Rental License": "Licenses and Fees"
  "Lease Fee": "Licenses and Fees"
  "Legal Expenses": "legal expenses"
  "Maintenance Labor": "Repairs and Maintenance"

  # Maintenance / turn-over
  "Repair (IA)": "Repairs and Maintenance"
  "Repair (IL)": "Repairs and Maintenance"
  "Cleaning (IA)": "Cleaning Fees"
  "Cleaning (IL)": "Cleaning Fees"
  "Supply and Materials": "Supplies"
  "Stock Materials": "Supplies"
  "Postage": "Postages"

  # Internal — exclude
  "Owner Distributions / S corp Distributions": null

# Maps Rent QC property names to template sheet names when they don't match exactly.
property_aliases:
